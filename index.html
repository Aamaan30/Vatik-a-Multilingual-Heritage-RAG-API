<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vatik Heritage RAG API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .loader {
            border: 3px solid #27272a; /* zinc-800 */
            border-top: 3px solid #f59e0b; /* amber-500 */
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; margin-bottom: 0.5rem; color: #fcd34d; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body pre { background: #18181b; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
        .markdown-body code { font-family: monospace; color: #10b981; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 font-sans min-h-screen flex flex-col">
    <header class="border-b border-zinc-800 bg-zinc-900/50 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-semibold text-amber-500 tracking-wide">Vatik<span class="text-zinc-500 font-light">API</span></h1>
            <nav class="flex gap-4">
                <button onclick="switchTab('ask')" id="tab-ask" class="text-amber-500 font-medium pb-1 border-b-2 border-amber-500 transition-colors">Ask AI</button>
                <button onclick="switchTab('ingest')" id="tab-ingest" class="text-zinc-500 hover:text-zinc-300 font-medium pb-1 border-b-2 border-transparent transition-colors">Ingest Data</button>
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-4 lg:p-6 relative">
        
        <!-- Ask Tab -->
        <div id="ask-view" class="h-full flex flex-col gap-4 animate-fade-in">
            <div class="flex-1 bg-zinc-900/40 border border-zinc-800 rounded-xl p-4 lg:p-6 overflow-y-auto flex flex-col gap-4" id="chat-container">
                <div class="text-zinc-500 text-center mt-10">
                    <svg class="w-12 h-12 mx-auto mb-3 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    <p class="text-lg">Ask a question to explore the heritage knowledge base.</p>
                </div>
            </div>
            
            <form id="ask-form" class="flex gap-2 bg-zinc-900 border border-zinc-800 p-2 rounded-xl focus-within:border-amber-500/50 transition-colors">
                <input type="text" id="ask-input" class="flex-1 bg-transparent border-none outline-none px-4 text-white placeholder-zinc-600" placeholder="Ask a question..." required>
                <button type="submit" class="bg-amber-600 hover:bg-amber-500 text-zinc-950 font-semibold px-6 py-2 rounded-lg transition-colors flex items-center justify-center min-w-[100px]">
                    <span id="ask-btn-text">Send</span>
                    <div id="ask-loader" class="loader hidden"></div>
                </button>
            </form>
        </div>

        <!-- Ingest Tab -->
        <div id="ingest-view" class="h-full flex flex-col gap-4 hidden animate-fade-in">
            <div class="mb-4">
                <h2 class="text-xl font-medium text-white mb-2">Ingest New Document</h2>
                <p class="text-zinc-400">Add text to the vector database to expand the RAG context.</p>
            </div>
            <form id="ingest-form" class="flex flex-col gap-4 flex-1">
                <textarea id="ingest-input" class="flex-1 w-full bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 text-white outline-none focus:border-amber-500/50 transition-colors resize-none placeholder-zinc-600" placeholder="Paste historical text here to ingest..." required></textarea>
                <div class="flex justify-end">
                    <button type="submit" class="bg-zinc-800 hover:bg-zinc-700 text-emerald-400 font-medium px-8 py-3 rounded-xl transition-colors flex items-center gap-2 border border-zinc-700">
                        <span id="ingest-btn-text">Ingest Document</span>
                        <div id="ingest-loader" class="loader hidden" style="border-top-color: #34d399;"></div>
                    </button>
                </div>
            </form>
            <div id="ingest-alert" class="hidden p-4 rounded-xl text-sm mt-2"></div>
        </div>
        
    </main>

    <script>
        function switchTab(tab) {
            const askView = document.getElementById('ask-view');
            const ingestView = document.getElementById('ingest-view');
            const tabAsk = document.getElementById('tab-ask');
            const tabIngest = document.getElementById('tab-ingest');

            if (tab === 'ask') {
                askView.classList.remove('hidden');
                ingestView.classList.add('hidden');
                
                tabAsk.className = "text-amber-500 font-medium pb-1 border-b-2 border-amber-500 transition-colors";
                tabIngest.className = "text-zinc-500 hover:text-zinc-300 font-medium pb-1 border-b-2 border-transparent transition-colors";
            } else {
                askView.classList.add('hidden');
                ingestView.classList.remove('hidden');
                
                tabIngest.className = "text-amber-500 font-medium pb-1 border-b-2 border-amber-500 transition-colors";
                tabAsk.className = "text-zinc-500 hover:text-zinc-300 font-medium pb-1 border-b-2 border-transparent transition-colors";
            }
        }

        function appendMessage(role, content) {
            const container = document.getElementById('chat-container');
            
            // Remove placeholder if present
            const placeholder = container.querySelector('.text-center.mt-10');
            if (placeholder) placeholder.remove();

            const div = document.createElement('div');
            div.className = `max-w-3xl w-full mx-auto p-4 rounded-xl flex gap-4 ${role === 'user' ? 'bg-zinc-900 border border-zinc-800' : ''}`;
            
            const icon = document.createElement('div');
            icon.className = `w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${role === 'user' ? 'bg-zinc-700 text-zinc-300' : 'bg-amber-600 text-zinc-950 font-bold'}`;
            icon.textContent = role === 'user' ? 'U' : 'V';
            
            const textDiv = document.createElement('div');
            textDiv.className = 'flex-1 pt-1 markdown-body text-zinc-300';
            
            if (role === 'ai') {
                textDiv.innerHTML = marked.parse(content);
            } else {
                textDiv.textContent = content;
            }

            div.appendChild(icon);
            div.appendChild(textDiv);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('ask-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('ask-input');
            const query = input.value.trim();
            if (!query) return;

            const btnText = document.getElementById('ask-btn-text');
            const loader = document.getElementById('ask-loader');

            input.value = '';
            appendMessage('user', query);

            btnText.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                // Determine absolute API URL depending on current origin for robustness
                const apiBase = window.location.origin;
                const response = await fetch(`${apiBase}/api/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                
                if (!response.ok) throw new Error('API request failed');
                
                const data = await response.json();
                appendMessage('ai', data.answer);
            } catch (err) {
                appendMessage('ai', '⚠️ Error: Could not reach the API.');
            } finally {
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        });

        document.getElementById('ingest-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('ingest-input');
            const text = input.value.trim();
            if (!text) return;

            const btnText = document.getElementById('ingest-btn-text');
            const loader = document.getElementById('ingest-loader');
            const alertBox = document.getElementById('ingest-alert');

            btnText.classList.add('hidden');
            loader.classList.remove('hidden');
            alertBox.classList.add('hidden');

            try {
                const apiBase = window.location.origin;
                const response = await fetch(`${apiBase}/api/ingest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                
                if (!response.ok) throw new Error('API request failed');
                
                alertBox.textContent = 'Document successfully ingested into the vector database!';
                alertBox.className = 'p-4 rounded-xl text-sm mt-4 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 block';
                input.value = '';
            } catch (err) {
                alertBox.textContent = 'Failed to ingest document. Please check the server logs.';
                alertBox.className = 'p-4 rounded-xl text-sm mt-4 bg-red-500/10 text-red-400 border border-red-500/20 block';
            } finally {
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>

version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: vatik_user
      POSTGRES_PASSWORD: vatik_password
      POSTGRES_DB: vatik_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vatik_user -d vatik_db"]
      interval: 5s
      timeout: 5s
      retries: 5

